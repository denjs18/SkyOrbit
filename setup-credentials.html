<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurer mes accès - SkyOrbit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card" style="max-width: 480px;">
            <div class="login-header">
                <div class="logo-container">
                    <i class="fas fa-key"></i>
                </div>
                <h1>SkyOrbit</h1>
                <p class="subtitle" id="welcomeMessage">Bienvenue ! Choisissez vos identifiants de connexion.</p>
            </div>

            <div class="alert alert-info py-2 mb-3" role="alert">
                <i class="fas fa-info-circle"></i>
                C'est votre première connexion. Choisissez un identifiant et un mot de passe personnels.
            </div>

            <form id="setupForm" class="login-form" novalidate>
                <div class="mb-3">
                    <label for="newUsername" class="form-label fw-semibold">
                        <i class="fas fa-user-tag"></i> Identifiant de connexion
                    </label>
                    <input type="text" class="form-control" id="newUsername" required
                           pattern="[a-zA-Z0-9._-]{3,32}"
                           placeholder="jean.dupont"
                           title="3 à 32 caractères : lettres, chiffres, point, tiret ou underscore"
                           autocomplete="username">
                    <div class="form-text">Vous pourrez vous connecter avec cet identifiant <em>ou</em> votre email.</div>
                </div>

                <div class="mb-3">
                    <label for="newPassword" class="form-label fw-semibold">
                        <i class="fas fa-lock"></i> Nouveau mot de passe
                    </label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="newPassword" required
                               minlength="8" placeholder="8 caractères minimum"
                               autocomplete="new-password">
                        <button type="button" class="btn btn-outline-secondary" id="togglePwd" tabindex="-1"
                                title="Afficher / masquer">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold">
                        <i class="fas fa-lock"></i> Confirmer le mot de passe
                    </label>
                    <input type="password" class="form-control" id="confirmPassword" required
                           minlength="8" placeholder="Répétez le mot de passe"
                           autocomplete="new-password">
                    <div class="invalid-feedback" id="confirmError">Les mots de passe ne correspondent pas.</div>
                </div>

                <button type="submit" class="btn btn-primary btn-lg w-100">
                    <i class="fas fa-check-circle"></i> Enregistrer et accéder au tableau de bord
                </button>
            </form>
        </div>

        <footer class="login-footer">
            <p>&copy; 2026 SkyOrbit</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/db.js"></script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/setup-credentials.js"></script>
</body>
</html>
